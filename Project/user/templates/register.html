    <div>
        <form action="/register" method="post" id="register_form">
            <p>Ім'я</p>
            <input type="text" placeholder="Enter your username" name="first_name" required minlength="3">
            <p>Email</p>
            <input type="email" placeholder="Enter your Email" name="email" required>
            <p>Пароль</p>
            <input type="password" placeholder="Enter your password" name="password" required minlength="8">
            <p>Підтвердження пароля</p>
            <input type="password" placeholder="Confirm your password" name="confirm_password" required>
            <button type="submit" id="render_verify">Send</button>
        </form>
        {% if message %}
            <p>{{message}}</p>
        {%endif%}
        <button id="render_login">Авторизуватись</button>
    </div>
